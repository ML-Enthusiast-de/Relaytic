project:
  name: relaytic

privacy:
  local_only: true
  api_calls_allowed: false
  telemetry_allowed: false

data:
  private_dir: data/private
  copy_inputs_to_run_dir: true
  immutable_working_copies: true
  never_modify_source_data: true
  persist_original_paths: false
  allow_streaming_sources: true
  allow_lakehouse_connectors: true
  default_stream_window_rows: 5000
  default_materialized_format: parquet
  allowed_extensions:
    - .csv
    - .tsv
    - .xlsx
    - .xls
    - .parquet
    - .pq
    - .feather
    - .json
    - .jsonl
    - .ndjson

ingestion:
  infer_header: true
  header_confidence_threshold: 0.7
  prompt_on_uncertain_header: true
  prompt_on_multi_sheet: true

preprocessing:
  normalization:
    enabled: optional
    method: minmax
    feature_range:
      - 0.0
      - 1.0
    normalize_target: true
    persist_state: true
    inverse_target_on_inference: true

system_knowledge:
  critical_signals: []
  physically_required_signals: []
  non_virtualizable_signals: []
  notes: ""

modeling:
  optimizer: optuna
  save_best_params: true
  persist_artifacts: true
  checkpoints:
    enabled: true
    dir: artifacts/checkpoints
    auto_save_after_training: true
    allow_resume_retraining: true
  forced_requests_allowed: true
  dependency_aware_ranking: true
  require_physical_dependency_for_virtual_signal: true
  post_test_feedback:
    enabled: true
    top_k_regions: 3
    trajectory_budget: 3
  agentic_loops:
    enabled: true
    max_attempts: 3
    min_relative_improvement: 0.02
    allow_architecture_switch: true
    allow_feature_set_expansion: true
    suggest_more_data_when_stalled: true

agent_behavior:
  always_inform_user: true
  ask_when_ambiguous: true

autonomy:
  execution_mode: autonomous
  operation_mode: bounded_loop
  allow_auto_run: true
  max_followup_rounds: 1
  max_branches_per_round: 2
  min_relative_improvement: 0.02
  allow_architecture_switch: true
  allow_feature_set_expansion: true
  suggest_more_data_when_stalled: true

intelligence:
  enabled: true
  intelligence_mode: deterministic
  prefer_local_llm: true
  allow_frontier_llm: false
  enable_backend_discovery: true
  allow_upgrade_suggestions: true
  require_schema_constrained_actions: true
  require_verifier_for_high_impact_decisions: true

communication:
  enabled: true
  allow_interactive_assist: true
  allow_stage_navigation: true
  allow_assistant_takeover: true
  prefer_local_semantic_assist: true
  allow_host_connection_guidance: true
  max_turn_history: 20

research:
  enabled: false
  require_redaction_default: true
  allow_benchmark_reference_retrieval: true
  allow_method_transfer: true
  max_queries: 3
  max_results_per_source: 5
  source_order:
    - semantic_scholar
    - crossref
  contact_email: ""
  semantic_scholar_endpoint: https://api.semanticscholar.org/graph/v1/paper/search
  crossref_endpoint: https://api.crossref.org/works

prompts:
  analyst_system_path: ""
  modeler_system_path: ""
  extra_instructions: ""

runtime:
  provider: llama_cpp
  require_local_models: true
  block_remote_endpoints: true
  offline_mode: true
  gateway_enabled: true
  read_only_hooks_enabled: true
  allow_write_hooks: false
  checkpoint_on_stage_complete: true
  capability_enforcement_enabled: true
  semantic_rowless_default: true
  max_recent_events: 50
  remote_default_model: gpt-4.1-mini
  temperature: 0.0
  timeout_seconds: 120
  endpoints:
    ollama: http://127.0.0.1:11434/api/chat
    llama_cpp: http://127.0.0.1:8000/v1/chat/completions
    openai: https://api.openai.com/v1/chat/completions
    openai_compatible: https://api.openai.com/v1/chat/completions
  profiles:
    small_cpu:
      model: relaytic-4b
      cpu_only: true
      n_gpu_layers: 0
      max_context: 8192
    balanced:
      model: relaytic-4b
      cpu_only: false
      n_gpu_layers: auto
      max_context: 8192
  default_profile: small_cpu
  fallback_order:
    - small_cpu
