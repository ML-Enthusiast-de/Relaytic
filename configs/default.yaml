project:
  name: relaytic

privacy:
  local_only: true
  api_calls_allowed: false
  telemetry_allowed: false

data:
  private_dir: data/private
  copy_inputs_to_run_dir: true
  immutable_working_copies: true
  never_modify_source_data: true
  persist_original_paths: false
  allow_streaming_sources: true
  allow_lakehouse_connectors: true
  default_stream_window_rows: 5000
  default_materialized_format: parquet
  allowed_extensions:
    - .csv
    - .tsv
    - .xlsx
    - .xls
    - .parquet
    - .pq
    - .feather
    - .json
    - .jsonl
    - .ndjson

ingestion:
  infer_header: true
  header_confidence_threshold: 0.7
  prompt_on_uncertain_header: true
  prompt_on_multi_sheet: true

preprocessing:
  normalization:
    enabled: optional
    method: minmax
    feature_range:
      - 0.0
      - 1.0
    normalize_target: true
    persist_state: true
    inverse_target_on_inference: true

system_knowledge:
  critical_signals: []
  physically_required_signals: []
  non_virtualizable_signals: []
  notes: ""

modeling:
  optimizer: optuna
  save_best_params: true
  persist_artifacts: true
  checkpoints:
    enabled: true
    dir: artifacts/checkpoints
    auto_save_after_training: true
    allow_resume_retraining: true
  forced_requests_allowed: true
  dependency_aware_ranking: true
  require_physical_dependency_for_virtual_signal: true
  post_test_feedback:
    enabled: true
    top_k_regions: 3
    trajectory_budget: 3
  agentic_loops:
    enabled: true
    max_attempts: 3
    min_relative_improvement: 0.02
    allow_architecture_switch: true
    allow_feature_set_expansion: true
    suggest_more_data_when_stalled: true

agent_behavior:
  always_inform_user: true
  ask_when_ambiguous: true

autonomy:
  execution_mode: autonomous
  operation_mode: bounded_loop
  allow_auto_run: true
  max_followup_rounds: 1
  max_branches_per_round: 2
  min_relative_improvement: 0.02
  allow_architecture_switch: true
  allow_feature_set_expansion: true
  suggest_more_data_when_stalled: true

intelligence:
  enabled: true
  intelligence_mode: deterministic
  prefer_local_llm: true
  allow_frontier_llm: false
  allow_max_reasoning: false
  minimum_local_llm_enabled: false
  minimum_local_llm_profile: none
  enable_backend_discovery: true
  allow_upgrade_suggestions: true
  allow_mode_routing: true
  hardware_aware_routing: true
  enable_semantic_proof: true
  require_schema_constrained_actions: true
  require_verifier_for_high_impact_decisions: true

communication:
  enabled: true
  allow_interactive_assist: true
  allow_stage_navigation: true
  allow_assistant_takeover: true
  prefer_local_semantic_assist: true
  allow_host_connection_guidance: true
  adaptive_onboarding_chat_enabled: true
  adaptive_onboarding_semantic_assist: true
  adaptive_onboarding_confirmation_required: true
  adaptive_onboarding_default_run_dir: artifacts/demo
  max_turn_history: 20

mission_control:
  enabled: true
  allow_onboarding_without_run: true
  allow_browser_launch: true
  prefer_static_html: true
  require_shared_truth: true
  expose_agent_surface: true
  default_expected_profile: full
  default_theme: signal
  auto_open_browser: true

dojo:
  enabled: true
  allow_method_self_improvement: true
  allow_architecture_proposals: true
  require_quarantine_before_promotion: true
  require_benchmark_gate: true
  require_quality_proxy_gate: true
  require_control_security_gate: true
  max_active_promotions: 3

pulse:
  enabled: true
  mode: propose_only
  schedule_minutes: 1440
  throttle_minutes: 60
  allow_innovation_watch: true
  allow_memory_maintenance: true
  allow_queue_refresh: true
  max_watchlist_items: 4
  max_recommendations: 4
  max_bounded_actions: 1
  require_rowless_innovation: true

tracing:
  enabled: true
  backfill_from_runtime_events: true
  direct_runtime_span_writes: true
  max_replay_spans: 80
  conformance_surfaces:
    - cli
    - mcp

evals:
  enabled: true
  require_protocol_conformance: true
  require_security_evals: true
  require_high_confidence_loser_proof: true
  fail_on_protocol_mismatch: true
  tracked_surfaces:
    - cli
    - mcp
  max_reported_findings: 6

handoff:
  enabled: true
  max_findings: 6
  max_risks: 5
  include_commands: true
  include_agent_artifact_paths: true

learnings:
  enabled: true
  max_entries: 120
  max_active_entries: 6
  track_assumptions: true
  track_feedback: true
  track_control_lessons: true

research:
  enabled: false
  require_redaction_default: true
  allow_benchmark_reference_retrieval: true
  allow_method_transfer: true
  max_queries: 3
  max_results_per_source: 5
  source_order:
    - semantic_scholar
    - crossref
  contact_email: ""
  semantic_scholar_endpoint: https://api.semanticscholar.org/graph/v1/paper/search
  crossref_endpoint: https://api.crossref.org/works

benchmark:
  enabled: true
  require_same_split_contract: true
  require_same_metric_contract: true
  use_optional_flaml_reference: false
  allow_time_series_references: true
  max_reference_models: 3
  near_parity_absolute_delta: 0.03
  near_parity_relative_delta: 0.08

feedback:
  enabled: true
  accept_human_feedback: true
  accept_external_agent_feedback: true
  accept_runtime_failure_feedback: true
  accept_benchmark_review_feedback: true
  accept_outcome_observations: true
  min_acceptance_score: 0.68
  downgrade_threshold: 0.40
  allow_route_prior_updates: true
  allow_policy_update_suggestions: true
  allow_decision_policy_update_suggestions: true
  max_casebook_entries: 50

profiles:
  enabled: true
  allow_operator_profile_overlays: true
  allow_lab_profile_overlays: true
  allow_assumption_defaults: true
  require_visible_quality_gates: true
  require_visible_budget_consumption: true
  quality_review_mode: explicit_contracts

control:
  enabled: true
  allow_navigation_without_challenge: true
  challenge_material_requests: true
  checkpoint_before_override: true
  reject_policy_bypass: true
  skeptical_takeover_enabled: true
  causal_memory_enabled: true
  cross_run_memory_enabled: true
  max_prior_runs: 12
  max_ledger_entries: 40

decision:
  enabled: true
  allow_provisional_world_model: true
  allow_local_source_graph: true
  same_directory_only: true
  max_nearby_sources: 6
  max_join_candidates: 5
  max_compiled_templates: 6
  default_operator_review_capacity: medium
  controller_review_threshold: conditional_pass

prompts:
  analyst_system_path: ""
  modeler_system_path: ""
  extra_instructions: ""

runtime:
  provider: llama_cpp
  require_local_models: true
  block_remote_endpoints: true
  offline_mode: true
  gateway_enabled: true
  read_only_hooks_enabled: true
  allow_write_hooks: false
  checkpoint_on_stage_complete: true
  capability_enforcement_enabled: true
  semantic_rowless_default: true
  max_recent_events: 50
  remote_default_model: gpt-4.1-mini
  temperature: 0.0
  timeout_seconds: 120
  endpoints:
    ollama: http://127.0.0.1:11434/api/chat
    llama_cpp: http://127.0.0.1:8000/v1/chat/completions
    openai: https://api.openai.com/v1/chat/completions
    openai_compatible: https://api.openai.com/v1/chat/completions
  profiles:
    small_cpu:
      model: relaytic-4b
      cpu_only: true
      n_gpu_layers: 0
      max_context: 8192
    balanced:
      model: relaytic-4b
      cpu_only: false
      n_gpu_layers: auto
      max_context: 8192
  default_profile: small_cpu
  fallback_order:
    - small_cpu

events:
  enabled: true
  max_recent_dispatches: 60
  project_dispatches_without_live_subscribers: true
  read_only_subscribers_only: true

permissions:
  enabled: true
  default_mode: bounded_autonomy
  require_review_for_high_impact_actions: true
  allow_remote_actions: false
  max_recent_decisions: 40

daemon:
  enabled: true
  allow_background_execution: true
  allow_search_campaigns: true
  allow_memory_maintenance: true
  allow_pulse_followup: true
  allow_benchmark_campaigns: false
  stale_after_minutes: 180
  max_recent_job_events: 60
  checkpoint_resume_enabled: true
  require_approval_for_search_campaigns: true
  require_approval_for_benchmark_campaigns: true
